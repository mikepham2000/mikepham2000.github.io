# Site settings
title: "Huy Pham"
description: >- # this means to ignore newlines until "baseurl:"
  Nguyen Phat Huy Pham — Ph.D. candidate in Animal Breeding and Genetics at Iowa State University.
baseurl: ""
url: "https://mikepham2000.github.io"

# Author settings
author: "Nguyen Phat Huy Pham"
author_bio: "Ph.D. Candidate, Animal Breeding & Genetics — Iowa State University"
author_email: "phamhuy2@iastate.edu"

# CV
cv_file: "/assets/CV_Huy_Pham.pdf"

# Social media
twitter_username: ""
github_username: "mikepham2000"
linkedin_username: ""

# Build settings
markdown: kramdown
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .jekyll-cache/
  - .sass-cache/
  - /node_modules/
  - Gemfile
  - Gemfile.lock

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Pagination (if using jekyll-paginate)
paginate: 10
paginate_path: "/blog/page:num/"

# SEO Tag
social:
  name: Mike Pham
  links:
    - https://github.com/mikepham2000
