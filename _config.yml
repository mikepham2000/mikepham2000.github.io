# Site settings
title: "Mike Pham"
description: >- # this means to ignore newlines until "baseurl:"
  Welcome to my personal website. I share my projects, thoughts, and experiences here.
baseurl: ""
url: "https://mikepham2000.github.io"

# Author settings
author: "Mike Pham"
author_bio: "Software Developer | Tech Enthusiast"
author_email: "contact@mikepham2000.com"

# Social media
twitter_username: ""
github_username: "mikepham2000"
linkedin_username: ""

# Build settings
markdown: kramdown
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .jekyll-cache/
  - .sass-cache/
  - /node_modules/
  - Gemfile
  - Gemfile.lock

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Pagination (if using jekyll-paginate)
paginate: 10
paginate_path: "/blog/page:num/"

# SEO Tag
social:
  name: Mike Pham
  links:
    - https://github.com/mikepham2000
